<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sin conexión - SENAttend</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #39A900 0%, #2d7f00 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            padding: 20px;
        }
        
        .offline-container {
            text-align: center;
            max-width: 500px;
        }
        
        .offline-icon {
            font-size: 80px;
            margin-bottom: 20px;
            opacity: 0.9;
        }
        
        h1 {
            font-size: 32px;
            margin-bottom: 16px;
            font-weight: 600;
        }
        
        p {
            font-size: 18px;
            line-height: 1.6;
            opacity: 0.9;
            margin-bottom: 30px;
        }
        
        .retry-button {
            background: white;
            color: #39A900;
            border: none;
            padding: 15px 40px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }
        
        .retry-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }
        
        .retry-button:active {
            transform: translateY(0);
        }
        
        .status {
            margin-top: 30px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            font-size: 14px;
        }
        
        .online {
            color: #4ade80;
        }
        
        .offline {
            color: #fca5a5;
        }
    </style>
</head>
<body>
    <div class="offline-container">
        <div class="offline-icon">📡</div>
        <h1>Sin conexión a internet</h1>
        <p>
            No pudimos conectarnos al servidor. Por favor, verifica tu conexión a internet 
            e intenta nuevamente.
        </p>
        <button class="retry-button" onclick="window.location.reload()">
            Reintentar
        </button>
        <div class="status">
            Estado: <span id="status" class="offline">Sin conexión</span>
        </div>
    </div>

    <script>
        // Detectar cuando se recupera la conexión
        window.addEventListener('online', () => {
            document.getElementById('status').textContent = 'Conectado';
            document.getElementById('status').className = 'online';
            setTimeout(() => {
                window.location.reload();
            }, 1000);
        });

        window.addEventListener('offline', () => {
            document.getElementById('status').textContent = 'Sin conexión';
            document.getElementById('status').className = 'offline';
        });

        // Actualizar estado inicial
        if (navigator.onLine) {
            document.getElementById('status').textContent = 'Conectado';
            document.getElementById('status').className = 'online';
        }
    </script>
</body>
</html>
